<!DOCTYPE html>
<html>
<head>
    <title>Xanoth Explorer Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body { margin:0; background:#111; }
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script>

// =====================
// 🌍 CONFIG XANOTH
// =====================

const SPAWN_X = 0;
const SPAWN_Z = 0;

// zones que TU ajoutes (tes explorations)
let visitedZones = [
    {x: 2000, z: -3000},
    {x: -4000, z: 1500}
];

// =====================
// 🧠 IA SCORE
// =====================

function distance(x, z) {
    return Math.sqrt(x*x + z*z);
}

function isVisited(x, z) {
    return visitedZones.some(v =>
        Math.abs(v.x - x) < 1000 && Math.abs(v.z - z) < 1000
    );
}

// distance spawn
function fDistance(d) {
    if (d < 1500) return 0.2;
    if (d < 6000) return 1.0;
    if (d < 12000) return 0.7;
    return 0.4;
}

// logique Xanoth (bases souvent loin mais pas trop)
function fMeta(d) {
    if (d < 3000) return 0.5;
    if (d < 8000) return 1.0;
    return 0.7;
}

// exploration perso
function fExplore(visited) {
    return visited ? 0.2 : 1.0;
}

// SCORE FINAL
function computeScore(x, z) {
    let d = distance(x, z);

    let score =
        (3 * fDistance(d)) +
        (2 * fMeta(d)) +
        (4 * fExplore(isVisited(x, z)));

    return Math.round((score / 9) * 100);
}

// =====================
// 🎨 COULEURS
// =====================

function color(score) {
    if (score > 80) return "#ff3b3b"; // rouge
    if (score > 60) return "#ff9f1c"; // orange
    if (score > 40) return "#ffd60a"; // jaune
    return "#3a86ff"; // bleu
}

// =====================
// 🗺️ MAP
// =====================

var map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

// =====================
// 🔲 GRILLE XANOTH
// =====================

for (let x = -30000; x <= 30000; x += 2000) {
    for (let z = -30000; z <= 30000; z += 2000) {

        let visited = isVisited(x, z);
        let score = computeScore(x, z);

        let rect = L.rectangle([
            [x/200, z/200],
            [(x+2000)/200, (z+2000)/200]
        ], {
            color: color(score),
            weight: 1,
            fillOpacity: 0.5
        }).addTo(map);

        rect.bindPopup(`
            <b>Xanoth Zone</b><br>
            Score: ${score}%<br>
            X: ${x} / Z: ${z}<br>
            Exploré: ${visited}
        `);
    }
}

// =====================
// 🔥 BEST SPOTS IA
// =====================

function bestSpots() {
    let spots = [];

    for (let x = -30000; x <= 30000; x += 4000) {
        for (let z = -30000; z <= 30000; z += 4000) {
            spots.push({
                x,
                z,
                score: computeScore(x, z)
            });
        }
    }

    return spots.sort((a,b) => b.score - a.score).slice(0, 8);
}

bestSpots().forEach(s => {
    L.marker([s.x/200, s.z/200]).addTo(map)
        .bindPopup("🔥 SPOT XANOTH<br>Score: " + s.score);
});

</script>

</body>
</html>
